services:
  mysql:
    image: mysql:8.4
    container_name: auto-platform-mysql
    restart: unless-stopped
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:-root123456}"
      MYSQL_DATABASE: "${MYSQL_DATABASE:-auto_platform}"
      MYSQL_USER: "${MYSQL_USER:-auto_user}"
      MYSQL_PASSWORD: "${MYSQL_PASSWORD:-auto123456}"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root123456}"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql-data:
